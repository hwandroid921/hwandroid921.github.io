server:
  port: 8101
  tomcat:
    max-http-form-post-size: 200MB
spring:
  application:
    name: jeju
  datasource:
    url: jdbc:postgresql://localhost:5432/jeju
    username: postgres
    password: 1004
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        type:
          preferred_enum_type: VARCHAR
    show-sql: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB
file:
  upload-dir: C:/uploads/jeju/
