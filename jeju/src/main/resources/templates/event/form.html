<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout/layout">
<head>
    <meta charset="UTF-8">
    <title>행사 등록</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 th:text="${eventRequest.id == null ? '등록' : '수정'}"></h2>
        <form th:action="@{${eventRequest.id == null} ? '/event/insert' : '/event/edit/' + ${eventRequest.id}}"
              method="post" enctype="multipart/form-data" th:object="${eventRequest}">
            <div class="mb-3">
                <label>행사명</label>
                <input type="text" th:field="*{name}" class="form-control">
            </div>
            <div class="mb-3">
                <label>행사기간</label>
                <input type="text" th:field="*{period}" class="form-control">
            </div>
            <div class="mb-3">
                <label>행사 페이지</label>
                <input type="text" th:field="*{linkPage}" class="form-control">
            </div>
            <div class="mb-3">
                <label>행사 이미지</label>
                <input type="text" th:field="*{urlPath}" class="form-control">
            </div>
            <button class="btn btn-primary">저장</button>
        </form>
    </div>
</body>
</html>
