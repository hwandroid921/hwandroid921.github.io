<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>회원가입</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/user/join.css}">
    </th:block>
</head>

<body>
<div layout:fragment="content">
    <div class="page" id="join_page">
        <div class="page_wrap">
            <div class="page_grid">

                <div class="join_page_box">
                    <div class="join_page">
                        <h3>회원가입</h3>
                        <form th:action="@{/member/join}" th:object="${memberJoinRequest}" method="post">

                            <!-- 전체 에러 메시지 -->
                            <div th:if="${#fields.hasGlobalErrors()}"
                                 class="alert alert-danger" role="alert">
                                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">에러</p>
                            </div>

                            <!-- 이용약관 동의 -->
                            <div class="join_agreement">
                                <div class="label_box_agree">이용약관동의<span>*</span></div>
                                <div class="input_inner">
                                    <div class="check">
                                        <ul class="check_all">
                                            <li>
                                                <input type="checkbox" id="all_agree">
                                                <label for="all_agree">전체 동의합니다.</label>
                                            </li>
                                        </ul>
                                        <ul class="check_choice">
                                            <li>
                                                <input type="checkbox" id="check_agree1" class="sub_agree">
                                                <label for="check_agree1"><span>본인은 만 14세 이상입니다.</span>(필수)</label>
                                            </li>
                                            <li>
                                                <input type="checkbox" id="check_agree2" class="sub_agree">
                                                <label for="check_agree2"><span>이용약관 동의</span>(필수)</label>
                                            </li>
                                            <li>
                                                <input type="checkbox" id="check_agree3" class="sub_agree">
                                                <label for="check_agree3"><span>개인정보 수집 · 이용 동의</span>(필수)</label>
                                            </li>
                                            <li>
                                                <input type="checkbox" id="check_agree4" class="sub_agree">
                                                <label for="check_agree4"><span>개인정보 수집 · 이용 동의</span>(선택)</label>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                            <hr>

                            <!-- 이메일 -->
                            <div class="form_row">
                                <div class="label_box">
                                    <label for="user_email">이메일</label>
                                </div>
                                <div class="input_inner">
                                    <input type="text" th:field="*{username}"
                                           th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                           id="user_email"
                                           placeholder="E-mail을 입력하세요.">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                                         th:errors="*{username}"></div>
                                    <button type="button" class="btn_inline">중복확인</button>
                                </div>
                            </div>

                            <!-- 비밀번호 -->
                            <div class="form_row">
                                <div class="label_box">
                                    <label for="user_pw">비밀번호</label>
                                </div>
                                <div class="input_inner">
                                    <input type="password" th:field="*{password}"
                                           th:classappend="${#fields.hasErrors('password')}? 'is-invalid'"
                                           id="user_pw"
                                           placeholder="Password를 입력하세요.">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}"></div>
                                </div>
                            </div>

                            <!-- 비밀번호 확인 (서버 전송 불필요, JS 검증용) -->
                            <div class="form_row">
                                <div class="label_box">
                                    <label for="passwordConfirm">비밀번호 확인</label>
                                </div>
                                <div class="input_inner">
                                    <input type="password"
                                           th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid'"
                                           id="passwordConfirm"
                                           th:field="*{passwordConfirm}"
                                           placeholder="비밀번호를 다시 입력하세요">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('passwordConfirm')}"
                                         th:errors="*{passwordConfirm}"></div>
                                </div>
                            </div>

                            <!-- 이름 -->
                            <div class="form_row">
                                <div class="label_box">
                                    <label for="user_name">이름</label>
                                </div>
                                <div class="input_inner">
                                    <input type="text" th:field="*{name}"
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                           id="user_name"
                                           placeholder="Name을 입력하세요.">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                                         th:errors="*{name}"></div>
                                </div>
                            </div>

                            <!-- 연락처 -->
                            <div class="form_row">
                                <div class="label_box">
                                    <label for="user_phone">연락처</label>
                                </div>
                                <div class="input_inner">
                                    <input type="text" th:field="*{phone}" id="user_phone"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                           placeholder="숫자만 입력하세요.">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}"
                                         th:errors="*{name}"></div>
                                </div>
                            </div>

                            <div class="btn_con">
                                <button type="submit" class="btn_join">가입하기</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="join_img_box">
                    <div class="join_img">
                        <img th:src="@{/images/user/join.jpg}" alt="">
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- 페이지 전용 스크립트 -->
<th:block layout:fragment="script">
    <script>
        const allAgree = document.getElementById("all_agree");
        const subAgrees = document.querySelectorAll(".sub_agree");

        // 전체 동의 클릭 시
        allAgree.addEventListener("change", () => {
            subAgrees.forEach(cb => cb.checked = allAgree.checked);
        });

        // 개별 체크 클릭 시 → 전체 동의 상태 갱신
        subAgrees.forEach(cb => {
            cb.addEventListener("change", () => {
                allAgree.checked = [...subAgrees].every(c => c.checked);
            });
        });

        // 가입하기 유효성 검사
        document.querySelector(".btn_join").addEventListener("click", function (e) {
            e.preventDefault();

            const agree1 = document.getElementById("check_agree1");
            const agree2 = document.getElementById("check_agree2");
            const agree3 = document.getElementById("check_agree3");
            const pw     = document.getElementById("user_pw");
            const pwck   = document.getElementById("user_pwck");

            if (!agree1.checked) { alert("만 14세 이상인지 확인해 주세요."); agree1.focus(); return; }
            if (!agree2.checked) { alert("이용약관에 동의해 주세요."); agree2.focus(); return; }
            if (!agree3.checked) { alert("개인정보처리 방침(필수)에 동의해 주세요."); agree3.focus(); return; }
            if (pw.value !== pwck.value) { alert("비밀번호가 일치하지 않습니다."); pwck.focus(); return; }

            e.target.closest("form").submit();
        });
    </script>
</th:block>

</body>
</html>
