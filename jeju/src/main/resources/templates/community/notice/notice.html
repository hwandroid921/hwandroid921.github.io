<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>공지사항 - 제주관광</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/community/notice.css}">
    </th:block>
</head>

<body>
<div layout:fragment="content">
    <div class="bgi_con">
        <img th:src="@{/images/community/community_noti_bg.jpg}" alt="">
    </div>
    <div class="main_con">
        <!-- tnb 메뉴 -->
        <div class="sub_tnb_con">
            <ul>
                <li><a th:href="@{/community/notice}">공지사항</a></li>
                <li><a th:href="@{/community/tourguide/list}">여행후기</a></li>
                <li><a th:href="@{/community/complaint}">불편신고</a></li>
                <li><a th:href="@{/community/event}">이벤트</a></li>
                <li><a th:href="@{/community/qna}">자주묻는질문</a></li>
            </ul>
        </div>

        <!-- 메인 컨텐츠 -->
        <div class="page" id="notice_page">
            <div class="page_wrap">
                <div class="page_tit">
                    <h3>공지사항</h3>
                </div>
                <div class="page_grid">
                    <div class="row1">
                        <div class="search_box">
                            <form th:action="@{/community/notice}" method="get">
                                <select name="searchType">
                                    <option value="title">제목</option>
                                    <option value="content">내용</option>
                                </select>
                                <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어를 입력하세요">
                                <button type="submit">검색</button>
                            </form>
                        </div>
                        <table class="notice_list">
                            <thead>
                                <tr>
                                    <th>번호</th>
                                    <th>제목</th>
                                    <th>작성자</th>
                                    <th>작성일</th>
                                    <th>조회수</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 공지 고정글 -->
                                <tr th:each="notice : ${pinnedList}" class="notice_pin">
                                    <td th:text="${notice.id}"></td>
                                    <td>
                                        <a th:href="@{/community/notice/{id}(id=${notice.id})}" th:text="${notice.title}"></a>
                                    </td>
                                    <td th:text="${notice.author}"></td>
                                    <td th:text="${notice.createdAt}"></td>
                                    <td th:text="${notice.viewCount}"></td>
                                </tr>
                                <!-- 일반 목록 -->
                                <tr th:each="notice : ${noticeList}">
                                    <td th:text="${notice.id}"></td>
                                    <td>
                                        <a th:href="@{/community/notice/{id}(id=${notice.id})}" th:text="${notice.title}"></a>
                                    </td>
                                    <td th:text="${notice.author}"></td>
                                    <td th:text="${notice.createdAt}"></td>
                                    <td th:text="${notice.viewCount}"></td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="pagination">
                            <a th:href="@{/community/notice(page=${currentPage - 1})}" class="prev">◀</a>
                            <a th:each="i : ${#numbers.sequence(1, totalPages)}"
                               th:href="@{/community/notice(page=${i})}"
                               th:text="${i}"
                               th:classappend="${i == currentPage} ? 'active'"></a>
                            <a th:href="@{/community/notice(page=${currentPage + 1})}" class="next">▶</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
