<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">

<head>
    <title>공지사항 - 제주관광</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/community/notice.css}">
        <style>
            .admin_btn_wrap { display: flex; justify-content: flex-end; margin-bottom: 10px; }
            .btn_write { padding: 8px 20px; background: #FFA500; color: #fff; border-radius: 5px; text-decoration: none; font-size: 14px; }
            .btn_write:hover { background: #e69400; }
            .badge_important { display: inline-block; background: #e04040; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }
            .pagination .disabled { color: #ccc; cursor: default; pointer-events: none; }
        </style>
    </th:block>
</head>

<body>
<div layout:fragment="content">
    <div class="bgi_con">
        <img th:src="@{/images/community/community_noti_bg.jpg}" alt="">
    </div>
    <div class="main_con">
        <!-- tnb 메뉴 -->
        <div class="sub_tnb_con">
            <ul>
                <li><a th:href="@{/community/notice/list}">공지사항</a></li>
                <li><a th:href="@{/community/tourguide/list}">여행후기</a></li>
                <li><a th:href="@{/community/event}">이벤트</a></li>
                <li><a th:href="@{/community/complaint}">불편신고</a></li>
                <li><a th:href="@{/community/qna}">자주묻는질문</a></li>
            </ul>
        </div>

        <!-- 메인 컨텐츠 -->
        <div class="page" id="notice_page">
            <div class="page_wrap">
                <div class="page_tit">
                    <h3>공지사항</h3>
                </div>
                <div class="page_grid">
                    <div class="row1">
                        <!-- 관리자 글 작성 버튼 -->
                        <div class="admin_btn_wrap" th:if="${session.loginMember != null and session.loginMember.role.name() == 'ADMIN'}">
                            <a th:href="@{/community/notice/write}" class="btn_write">+ 공지 작성</a>
                        </div>

                        <div class="search_box">
                            <form th:action="@{/community/notice/list}" method="get">
                                <select name="searchType">
                                    <option value="title">제목</option>
                                    <option value="content">내용</option>
                                </select>
                                <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어를 입력하세요">
                                <button type="submit">검색</button>
                            </form>
                        </div>
                        <table class="notice_list">
                            <thead>
                                <tr>
                                    <th>번호</th>
                                    <th>제목</th>
                                    <th>작성자</th>
                                    <th>작성일</th>
                                    <th>조회수</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 공지 고정글 -->
                                <tr th:each="notice : ${pinnedList}" th:if="${pinnedList != null}" class="notice_pin">
                                    <td th:text="${notice.id}"></td>
                                    <td>
                                        <span class="badge_important">중요</span>
                                        <a th:href="@{/community/notice/detail/{id}(id=${notice.id})}" th:text="${notice.title}"></a>
                                    </td>
                                    <td th:text="${notice.authorName}"></td>
                                    <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}"></td>
                                    <td th:text="${notice.views}"></td>
                                </tr>
                                <!-- 일반 목록 -->
                                <tr th:each="notice : ${noticeList}" th:if="${noticeList != null and !#lists.isEmpty(noticeList)}">
                                    <td th:text="${notice.id}"></td>
                                    <td>
                                        <a th:href="@{/community/notice/detail/{id}(id=${notice.id})}" th:text="${notice.title}"></a>
                                    </td>
                                    <td th:text="${notice.authorName}"></td>
                                    <td th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}"></td>
                                    <td th:text="${notice.views}"></td>
                                </tr>
                                <tr th:if="${noticeList == null or #lists.isEmpty(noticeList)}">
                                    <td colspan="5" style="text-align:center;">등록된 공지사항이 없습니다.</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="pagination">
                            <!-- prev: 첫 페이지면 비활성 -->
                            <a th:if="${currentPage > 1}"
                               th:href="@{/community/notice/list(page=${currentPage - 1}, searchType=${searchType}, keyword=${keyword})}"
                               class="prev">◀</a>
                            <span th:unless="${currentPage > 1}" class="prev disabled">◀</span>

                            <!-- 페이지 번호: startPage ~ endPage (1-indexed, 컨트롤러와 일치) -->
                            <a th:each="i : ${#numbers.sequence(startPage, endPage)}"
                               th:href="@{/community/notice/list(page=${i}, searchType=${searchType}, keyword=${keyword})}"
                               th:text="${i}"
                               th:classappend="${i == currentPage} ? ' active'"></a>

                            <!-- next: 마지막 페이지면 비활성 -->
                            <a th:if="${currentPage < totalPages}"
                               th:href="@{/community/notice/list(page=${currentPage + 1}, searchType=${searchType}, keyword=${keyword})}"
                               class="next">▶</a>
                            <span th:unless="${currentPage < totalPages}" class="next disabled">▶</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
